version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assetflow-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: assetflow-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/assetflow?schema=public
      - JWT_SECRET=assetflow_super_secret_jwt_key_for_hackathon
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: assetflow-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
